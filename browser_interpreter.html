<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Browser Interpreter</title>
    <!-- Paper.js for vector graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
    <!-- Anime.js for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }
        canvas {
            display: block;
            background: transparent;
        }
        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            color: red;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            display: block;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="debug">Connecting...</div>
    
    <script>
        const debugEl = document.getElementById('debug');
        let wsConnected = false;
        
        function debug(msg) {
            console.log(msg);
            debugEl.textContent = msg;
        }
        
        debug('Browser Interpreter starting...');
        
        // ============================================
        // PAPER.JS SETUP
        // ============================================
        
        // Setup Paper.js
        const canvas = document.getElementById('canvas');
        canvas.width = 1920;
        canvas.height = 1080;
        paper.setup(canvas);
        
        // Convenient aliases
        const { view, Path, Point, Size } = paper;
        const center = view.center;
        
        // ============================================
        // INTERPRETER FUNCTIONS (called by eval)
        // ============================================
        
        function parseColor(colorStr) {
            const colors = {
                'red': '#FF0000',
                'green': '#00FF00',
                'blue': '#0000FF',
                'yellow': '#FFFF00',
                'cyan': '#00FFFF',
                'magenta': '#FF00FF',
                'white': '#FFFFFF',
                'black': '#000000',
                'orange': '#FFA500',
                'purple': '#800080',
                'pink': '#FFC0CB',
                'brown': '#8B4513'
            };
            
            const lower = String(colorStr).toLowerCase().replace(/['"]/g, '');
            return colors[lower] || colorStr;
        }
        
        function circle(radius, color, x = center.x, y = center.y) {
            const path = new Path.Circle({
                center: [x, y],
                radius: radius,
                fillColor: parseColor(color)
            });
            console.log('Created circle:', path);
            return path;
        }
        
        function square(size, color, x = center.x, y = center.y) {
            const path = new Path.Rectangle({
                center: [x, y],
                size: [size, size],
                fillColor: parseColor(color)
            });
            console.log('Created square:', path);
            return path;
        }
        
        function rect(width, height, color, x = center.x, y = center.y) {
            const path = new Path.Rectangle({
                center: [x, y],
                size: [width, height],
                fillColor: parseColor(color)
            });
            return path;
        }
        
        function ellipse(width, height, color, x = center.x, y = center.y) {
            const path = new Path.Ellipse({
                center: [x, y],
                size: [width, height],
                fillColor: parseColor(color)
            });
            return path;
        }
        
        // Scale with animation (using Anime.js)
        function scale(obj, factor, duration = 1) {
            if (!obj) {
                console.error('scale: invalid object', obj);
                return;
            }
            
            const center = obj.position.clone();
            const targetSize = obj.bounds.size.multiply(factor);
            
            anime({
                targets: obj.bounds.size,
                width: targetSize.width,
                height: targetSize.height,
                duration: duration * 1000,
                easing: 'easeOutCubic',
                update: () => {
                    obj.position = center;
                    view.update();
                }
            });
        }
        
        // Move with animation
        function move(obj, x, y, duration = 0) {
            if (!obj || !obj.position) {
                console.error('move: invalid object', obj);
                return;
            }
            
            if (duration > 0) {
                anime({
                    targets: obj.position,
                    x: x,
                    y: y,
                    duration: duration * 1000,
                    easing: 'easeOutCubic',
                    update: () => view.update()
                });
            } else {
                obj.position.x = x;
                obj.position.y = y;
            }
        }
        
        // Rotate (degrees)
        function rotate(obj, degrees, duration = 0) {
            if (!obj) return;
            
            if (duration > 0) {
                const targetRotation = obj.rotation + degrees;
                anime({
                    targets: obj,
                    rotation: targetRotation,
                    duration: duration * 1000,
                    easing: 'easeOutCubic',
                    update: () => view.update()
                });
            } else {
                obj.rotation += degrees;
            }
        }
        
        // Fade opacity
        function fade(obj, targetOpacity, duration = 1) {
            if (!obj) return;
            
            anime({
                targets: obj,
                opacity: targetOpacity,
                duration: duration * 1000,
                easing: 'easeOutCubic',
                update: () => view.update()
            });
        }
        
        // Remove object
        function remove(obj) {
            if (obj && obj.remove) {
                obj.remove();
            }
        }
        
        // Clear all
        function clear() {
            paper.project.activeLayer.removeChildren();
            console.log('Cleared all objects');
        }
        
        // ============================================
        // MAKE FUNCTIONS GLOBALLY ACCESSIBLE
        // ============================================
        
        // Expose functions to global scope for eval()
        window.anime = anime;
        window.circle = circle;
        window.square = square;
        window.rect = rect;
        window.ellipse = ellipse;
        window.scale = scale;
        window.move = move;
        window.rotate = rotate;
        window.fade = fade;
        window.remove = remove;
        window.clear = clear;
        
        // Also expose Paper.js objects for direct manipulation
        window.paper = paper;
        window.Path = Path;
        window.Point = Point;
        window.Size = Size;
        window.view = view;
        window.center = center;
        
        // ============================================
        // WEBSOCKET CONNECTION
        // ============================================
        
        let ws;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        
        function connectWebSocket() {
            try {
                const wsUrl = 'ws://127.0.0.1:8000/ws';
                debug('Connecting to: ' + wsUrl);
                
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    wsConnected = true;
                    reconnectAttempts = 0;
                    debug('Connected! Waiting for commands...');
                    console.log('WebSocket connected');
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        
                        if (data.command === 'execute') {
                            let code = data.code;
                            debug('Executing: ' + code);
                            console.log('>>> EVAL:', code);
                            
                            try {
                                // Replace 'let varname =' with 'window.varname =' to make variables global
                                code = code.replace(/\blet\s+(\w+)\s*=/g, 'window.$1 =');
                                code = code.replace(/\bconst\s+(\w+)\s*=/g, 'window.$1 =');
                                
                                // Execute in global scope
                                (0, eval)(code);
                            } catch (e) {
                                console.error('Execution error:', e);
                                debug('Error: ' + e.message);
                            }
                        }
                    } catch (e) {
                        debug('Parse error: ' + e.message);
                        console.error('Parse error:', e);
                    }
                };
                
                ws.onerror = (error) => {
                    debug('WebSocket error');
                    console.error('WebSocket error:', error);
                };
                
                ws.onclose = () => {
                    wsConnected = false;
                    debug('Disconnected');
                    console.log('WebSocket closed');
                    
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        debug('Reconnecting... attempt ' + reconnectAttempts);
                        setTimeout(connectWebSocket, 2000);
                    }
                };
            } catch (e) {
                debug('Error creating WebSocket: ' + e.message);
            }
        }
        
        // Start connection
        connectWebSocket();
        
        console.log('Paper.js initialized, view size:', view.size);
        debug('Ready');
        
    </script>
</body>
</html>
