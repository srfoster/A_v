<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Browser Interpreter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }
        canvas {
            display: block;
            background: transparent;
        }
        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            color: red;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="debug">Connecting...</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const debugEl = document.getElementById('debug');
        
        // Canvas setup
        canvas.width = 1920;
        canvas.height = 1080;
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // State
        let objects = [];
        let variables = {};  // Store references to objects
        let wsConnected = false;
        
        function debug(msg) {
            console.log(msg);
            debugEl.textContent = msg;
        }
        
        debug('Browser Interpreter starting...');
        
        // ============================================
        // INTERPRETER FUNCTIONS (called by eval)
        // ============================================
        
        function circle(radius, color, x = centerX, y = centerY) {
            const obj = {
                type: 'circle',
                radius: radius,
                color: color,
                x: x,
                y: y
            };
            objects.push(obj);
            render();
            return obj;  // Return reference for variable assignment
        }
        
        function square(size, color, x = centerX, y = centerY) {
            const obj = {
                type: 'square',
                size: size,
                color: color,
                x: x,
                y: y
            };
            objects.push(obj);
            render();
            return obj;
        }
        
        function scale(obj, factor) {
            if (obj.type === 'circle') {
                obj.radius *= factor;
            } else if (obj.type === 'square') {
                obj.size *= factor;
            }
            render();
        }
        
        function move(obj, x, y) {
            obj.x = x;
            obj.y = y;
            render();
        }
        
        function clear() {
            objects = [];
            variables = {};
            render();
        }
        
        // ============================================
        // RENDERING
        // ============================================
        
        function parseColor(colorStr) {
            const colors = {
                'red': '#FF0000',
                'green': '#00FF00',
                'blue': '#0000FF',
                'yellow': '#FFFF00',
                'cyan': '#00FFFF',
                'magenta': '#FF00FF',
                'white': '#FFFFFF',
                'black': '#000000',
                'orange': '#FFA500',
                'purple': '#800080'
            };
            
            const lower = String(colorStr).toLowerCase().replace(/['"]/g, '');
            return colors[lower] || colorStr;
        }
        
        function render() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw all objects
            objects.forEach((obj, idx) => {
                if (obj.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                    ctx.fillStyle = parseColor(obj.color);
                    ctx.fill();
                } else if (obj.type === 'square') {
                    ctx.fillStyle = parseColor(obj.color);
                    ctx.fillRect(obj.x - obj.size/2, obj.y - obj.size/2, obj.size, obj.size);
                }
            });
            
            console.log('Rendered ' + objects.length + ' objects');
        }
        
        // ============================================
        // WEBSOCKET CONNECTION
        // ============================================
        
        let ws;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        
        function connectWebSocket() {
            try {
                const wsUrl = 'ws://127.0.0.1:8000/ws';
                debug('Connecting to: ' + wsUrl);
                
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    wsConnected = true;
                    reconnectAttempts = 0;
                    debug('Connected! Waiting for commands...');
                    console.log('WebSocket connected');
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        
                        if (data.command === 'execute') {
                            let code = data.code;
                            debug('Executing: ' + code);
                            console.log('>>> EVAL:', code);
                            
                            try {
                                // Replace 'let varname =' with 'window.varname =' to make variables global
                                code = code.replace(/\blet\s+(\w+)\s*=/g, 'window.$1 =');
                                code = code.replace(/\bconst\s+(\w+)\s*=/g, 'window.$1 =');
                                
                                // Execute in global scope
                                (0, eval)(code);
                            } catch (e) {
                                console.error('Execution error:', e);
                                debug('Error: ' + e.message);
                            }
                        }
                    } catch (e) {
                        debug('Parse error: ' + e.message);
                        console.error('Parse error:', e);
                    }
                };
                
                ws.onerror = (error) => {
                    debug('WebSocket error');
                    console.error('WebSocket error:', error);
                };
                
                ws.onclose = () => {
                    wsConnected = false;
                    debug('Disconnected');
                    console.log('WebSocket closed');
                    
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        debug('Reconnecting... attempt ' + reconnectAttempts);
                        setTimeout(connectWebSocket, 2000);
                    }
                };
            } catch (e) {
                debug('Error creating WebSocket: ' + e.message);
            }
        }
        
        // Start connection
        connectWebSocket();
        
        // Initial render
        render();
        
        // Test dot after 1 second
        setTimeout(() => {
            ctx.fillStyle = 'red';
            ctx.fillRect(centerX - 5, centerY - 5, 10, 10);
            debug('Ready');
        }, 1000);
    </script>
</body>
</html>
